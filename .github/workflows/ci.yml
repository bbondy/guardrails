name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt-test:
    name: Fmt and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --locked

  cross-build:
    name: Cross Build
    runs-on: ubuntu-latest
    needs: fmt-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: guardrails-linux-amd64
            ext: ""
          - target: aarch64-unknown-linux-gnu
            artifact: guardrails-linux-arm64
            ext: ""
          - target: x86_64-apple-darwin
            artifact: guardrails-darwin-amd64
            ext: ""
          - target: aarch64-apple-darwin
            artifact: guardrails-darwin-arm64
            ext: ""
          - target: x86_64-pc-windows-gnu
            artifact: guardrails-windows-amd64
            ext: ".exe"
          - target: aarch64-pc-windows-gnullvm
            artifact: guardrails-windows-arm64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Build target
        run: cargo zigbuild --release --target "${{ matrix.target }}" --config profile.release.strip=false

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/guardrails${{ matrix.ext }}" \
             "dist/${{ matrix.artifact }}${{ matrix.ext }}"
          sha256sum "dist/${{ matrix.artifact }}${{ matrix.ext }}" \
            > "dist/${{ matrix.artifact }}${{ matrix.ext }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}${{ matrix.ext }}
            dist/${{ matrix.artifact }}${{ matrix.ext }}.sha256
          if-no-files-found: error

  publish-release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: cross-build
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: guardrails-*
          path: dist
          merge-multiple: true

      - name: Build checksum manifest
        run: |
          cd dist
          rm -f SHA256SUMS
          for file in guardrails-*; do
            case "$file" in
              *.sha256|SHA256SUMS) continue ;;
            esac
            [ -f "$file" ] || continue
            sha256sum "$file" >> SHA256SUMS
          done

      - name: Create GitHub release with assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
