<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="460" viewBox="0 0 1280 460" role="img" aria-labelledby="title desc">
  <title id="title">guardrails component diagram</title>
  <desc id="desc">Flow from user shell to guardrails binary, then to CLI parsing, runner orchestration, checker, fallback filter, and output streams.</desc>
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .box { fill: #111827; stroke: #4b5563; stroke-width: 2; rx: 10; ry: 10; }
      .text { fill: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif; font-size: 18px; }
      .sub { fill: #9ca3af; font-size: 14px; }
      .line { stroke: #93c5fd; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#93c5fd" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="460"/>

  <rect class="box" x="40" y="40" width="180" height="80"/>
  <text class="text" x="130" y="88" text-anchor="middle">User shell</text>

  <rect class="box" x="280" y="40" width="220" height="80"/>
  <text class="text" x="390" y="78" text-anchor="middle">guardrails binary</text>
  <text class="sub" x="390" y="100" text-anchor="middle">main.rs</text>

  <rect class="box" x="560" y="40" width="220" height="80"/>
  <text class="text" x="670" y="78" text-anchor="middle">cli.rs</text>
  <text class="sub" x="670" y="100" text-anchor="middle">arg + mode parsing</text>

  <rect class="box" x="840" y="40" width="220" height="80"/>
  <text class="text" x="950" y="78" text-anchor="middle">runner.rs</text>
  <text class="sub" x="950" y="100" text-anchor="middle">mode orchestration</text>

  <rect class="box" x="840" y="180" width="220" height="80"/>
  <text class="text" x="950" y="218" text-anchor="middle">Wrapped command</text>
  <text class="sub" x="950" y="240" text-anchor="middle">or stdin capture</text>

  <rect class="box" x="560" y="180" width="220" height="80"/>
  <text class="text" x="670" y="218" text-anchor="middle">checker.rs</text>
  <text class="sub" x="670" y="240" text-anchor="middle">prompt + checker process</text>

  <rect class="box" x="280" y="180" width="220" height="80"/>
  <text class="text" x="390" y="218" text-anchor="middle">Checker tool</text>
  <text class="sub" x="390" y="240" text-anchor="middle">codex/claude/gemini/agent</text>

  <rect class="box" x="560" y="320" width="220" height="80"/>
  <text class="text" x="670" y="358" text-anchor="middle">filter.rs</text>
  <text class="sub" x="670" y="380" text-anchor="middle">local fallback sanitizer</text>

  <rect class="box" x="840" y="320" width="220" height="80"/>
  <text class="text" x="950" y="358" text-anchor="middle">stdout/stderr</text>
  <text class="sub" x="950" y="380" text-anchor="middle">+ exit code</text>

  <path class="line" d="M220 80 L280 80"/>
  <path class="line" d="M500 80 L560 80"/>
  <path class="line" d="M780 80 L840 80"/>
  <path class="line" d="M950 120 L950 180"/>
  <path class="line" d="M840 220 L780 220"/>
  <path class="line" d="M560 220 L500 220"/>
  <path class="line" d="M670 260 L670 320"/>
  <path class="line" d="M780 360 L840 360"/>
  <path class="line" d="M950 260 L950 320"/>
</svg>
